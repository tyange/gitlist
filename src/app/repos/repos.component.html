<div class="container repos-container">
  <app-repo-list></app-repo-list>
  <div
    class="repos-wrapper"
    (dragenter)="onDivDragEnter($event)"
    (dragover)="onDivDragOver($event)"
    (drop)="!draggingInRepos && onDrop(repos.items, location)"
  >
    <ul>
      <li
        *ngFor="let repo of repos.items; index as i"
        class="repository"
        [ngClass]="{
          'dragging-repository': dragging && draggingStyling(repo.id, repo.name)
        }"
        draggable="true"
        (dragstart)="onDragStart($event, i, repo)"
        (dragenter)="
          draggingInRepos && onDragEnter($event, repos.items, i, repo.name)
        "
        (dragend)="draggingInRepos && onDragEnd(repos.items)"
      >
        <span>
          {{ repo.name }}
        </span>
      </li>
    </ul>
  </div>
</div>
