<div class="container repos-container">
  <app-repo-list></app-repo-list>
  <div class="repos-wrapper">
    <button (click)="logging()">logging</button>
    <ul>
      <li
        *ngFor="let repo of repos.items; index as i"
        class="repository"
        draggable="true"
        (dragstart)="onDragStart($event, i, repo.id, repo.name, repo.url)"
        (dragenter)="onDragEnter($event, repos.items, i, repo.name)"
        (dragend)="onDragEnd(repos.items)"
      >
        <span>
          {{ repo.name }}
        </span>
      </li>
    </ul>
  </div>
</div>
